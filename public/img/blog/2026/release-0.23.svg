<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>
    .hidden-message {
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }

    svg:hover .hidden-message {
      opacity: 1;
    }

    .main-content {
      transition: opacity 0.3s ease-in-out;
    }

    svg:hover .main-content {
      opacity: 0.3;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
      100% { transform: translateY(0px); }
    }

    .floating {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .rotating {
      animation: rotate 12s linear infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    .pulsing {
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }

    .glowing {
      animation: glow 2.5s ease-in-out infinite;
    }

    @font-face {
      font-family: 'Zilla Slab';
      src: url('https://onetimesecret.com/dist/assets/ZillaSlab-Regular-CpTS5Ubm.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    text.release {
      font-family: 'Zilla Slab', sans-serif !important;
    }
  </style>

  <defs>
    <radialGradient id="migrationGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#7c3aed; stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3b0764; stop-opacity:1"/>
    </radialGradient>

    <!-- Wrench shape for config migration -->
    <path id="wrench" d="M -3,-10 L -1,-4 L -3,-2 L -6,-2 L -6,2 L -3,2 L -1,4 L -3,10 L 3,10 L 1,4 L 3,2 L 6,2 L 6,-2 L 3,-2 L 1,-4 L 3,-10 Z" />

    <!-- Document/file shape for config -->
    <path id="doc" d="M -5,-7 L -5,7 L 5,7 L 5,-4 L 2,-7 Z M 2,-7 L 2,-4 L 5,-4" />
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#migrationGradient)"/>

  <!-- Main content -->
  <g class="main-content">
    <!-- Version number -->
    <text class="release" x="78" y="112" font-size="42" font-weight="bold"
          text-anchor="middle" dominant-baseline="middle" fill="#fcf8f2">23</text>
    <text class="release" x="117" y="112" font-size="36" font-weight="bold"
          text-anchor="middle" dominant-baseline="middle" fill="#fcf8f2">.3</text>

    <!-- Thematic symbols -->
    <g class="floating">
      <!-- Wrench (config migration) -->
      <g transform="translate(100, 58) rotate(45)" class="glowing">
        <use href="#wrench" fill="#fbbf24" opacity="0.9" />
      </g>

      <!-- API key/route (guest routes) -->
      <g transform="translate(55, 140)" class="pulsing">
        <rect x="-10" y="-6" width="20" height="12" fill="#22d3ee" opacity="0.85" rx="2" />
        <text x="0" y="3" font-size="7" fill="#0e7490" text-anchor="middle" font-weight="bold">API</text>
      </g>

      <!-- Globe (i18n / Russian translation) -->
      <g transform="translate(145, 140)">
        <circle cx="0" cy="0" r="10" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.8" />
        <ellipse cx="0" cy="0" rx="5" ry="10" fill="none" stroke="#f472b6" stroke-width="1" opacity="0.6" />
        <line x1="-10" y1="0" x2="10" y2="0" stroke="#f472b6" stroke-width="1" opacity="0.6" />
        <text x="0" y="4" font-size="8" fill="#f9a8d4" text-anchor="middle" font-weight="bold">ру</text>
      </g>

      <!-- Document with arrow (migration) -->
      <g transform="translate(55, 75)" class="glowing">
        <use href="#doc" fill="#a78bfa" stroke="#c4b5fd" stroke-width="0.5" opacity="0.85" />
        <text x="0" y="3" font-size="6" fill="#3b0764" text-anchor="middle" font-weight="bold">→</text>
      </g>

      <!-- Bug fix checkmark -->
      <g transform="translate(145, 75)">
        <circle cx="0" cy="0" r="8" fill="#34d399" opacity="0.85" />
        <path d="M -4,0 L -1,3 L 4,-3" fill="none" stroke="#064e3b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </g>
    </g>

    <!-- Decorative dots -->
    <g class="pulsing">
      <circle cx="28" cy="170" r="2" fill="#fbbf24" opacity="0.5" />
      <circle cx="38" cy="178" r="1.5" fill="#22d3ee" opacity="0.5" />
      <circle cx="162" cy="170" r="2" fill="#f472b6" opacity="0.5" />
      <circle cx="172" cy="178" r="1.5" fill="#34d399" opacity="0.5" />
    </g>
  </g>

  <!-- Hidden message -->
  <g class="hidden-message">
    <rect x="20" y="70" width="160" height="60" fill="rgba(0,0,0,0.8)" rx="10" ry="10"/>
    <text x="100" y="88" font-size="11" text-anchor="middle" fill="#fcf8f2">
      Config Migration
    </text>
    <text x="100" y="103" font-size="11" text-anchor="middle" fill="#fcf8f2">
      Guest API Routes
    </text>
    <text x="100" y="122" font-size="10" text-anchor="middle" fill="#a1a1aa">
      i18n • TTL Fix • Rate Limits
    </text>
  </g>

  <!-- Title -->
  <text x="100" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#fcf8f2" font-family="'Zilla Slab', Arial, sans-serif">
    OnetimeSecret v0.23.3
  </text>

  <!-- Signature -->
  <text x="190" y="195" font-family="'Zilla Slab', Arial, sans-serif" font-size="8" font-style="italic" text-anchor="end" fill="#fcf8f2">Celebration by Claude 4.6</text>
</svg>
