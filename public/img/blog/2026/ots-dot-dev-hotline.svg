  <line x1="400" y1="86" x2="400" y2="344" stroke="#c04757" stroke-width="2.5"/>

  <!-- Phone handset icon on divider -->
  <rect x="381" y="126" width="38" height="38" rx="19" fill="#0a192f" stroke="#c04757" stroke-width="2"/>
  <!-- Simplified phone receiver shape -->
  <path d="M393,138 C393,134 395,132 398,132 L402,132 C405,132 407,134 407,138 L407,140 C407,142 406,143 404,143 L396,143 C394,143 393,142 393,140 Z" fill="#c04757"/>
  <rect x="397" y="143" width="6" height="8" rx="1" fill="#c04757"/>
  <path d="M393,151 C393,153 395,155 398,155 L402,155 C405,155 407,153 407,151 L407,149 C407,147 406,146 404,146 L396,146 C394,146 393,147 393,149 Z" fill="#c04757"/>

  <!-- "1-800" label -->
  <text x="400" y="180" font-size="9" font-weight="bold" fill="#ff6b9d" text-anchor="middle">1-800</text>

  <!-- Mirror arrows -->
  <g opacity="0.5">
    <path d="M388,208 L378,208" stroke="#888" stroke-width="1.2"/>
    <path d="M382,205 L378,208 L382,211" fill="none" stroke="#888" stroke-width="1.2"/>
    <path d="M412,208 L422,208" stroke="#888" stroke-width="1.2"/>
    <path d="M418,205 L422,208 L418,211" fill="none" stroke="#888" stroke-width="1.2"/>
  </g>
  <text x="400" y="218" font-size="7" fill="#888" text-anchor="middle">MIRRORS</text>

