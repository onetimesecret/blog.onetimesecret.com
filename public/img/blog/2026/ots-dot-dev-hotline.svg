  <path d="M205,254 L205,248 C205,243 215,243 215,248 L215,254" fill="none" stroke="#c04757" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <circle cx="210" cy="263" r="2" fill="#0a192f"/>

  <!-- Benefits text -->
  <text x="210" y="290" font-size="8" fill="#888" text-anchor="middle">customers · data sovereignty · uptime</text>

  <!-- Support subdomains hint -->
  <text x="210" y="330" font-size="8" fill="#555" text-anchor="middle">blog · docs · status</text>


