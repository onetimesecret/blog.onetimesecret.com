  <!-- Central server rack - WIREFRAME dashed -->
  <rect x="562" y="125" width="56" height="78" rx="4" fill="none" stroke="#454d5d" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="570" y="133" width="40" height="9" rx="2" fill="none" stroke="#454d5d" stroke-width="1" stroke-dasharray="4,2"/>
  <circle cx="602" cy="137" r="2.5" fill="none" stroke="#454d5d" stroke-width="1"/>
  <rect x="570" y="148" width="40" height="9" rx="2" fill="none" stroke="#454d5d" stroke-width="1" stroke-dasharray="4,2"/>
  <circle cx="602" cy="152" r="2.5" fill="none" stroke="#454d5d" stroke-width="1"/>
  <rect x="570" y="163" width="40" height="9" rx="2" fill="none" stroke="#454d5d" stroke-width="1" stroke-dasharray="4,2"/>
  <circle cx="602" cy="167" r="2.5" fill="none" stroke="#454d5d" stroke-width="1"/>
  <rect x="570" y="178" width="40" height="9" rx="2" fill="none" stroke="#454d5d" stroke-width="1" stroke-dasharray="4,2"/>
  <circle cx="602" cy="182" r="2.5" fill="none" stroke="#454d5d" stroke-width="1"/>

  <!-- TLD badge - outlined -->
  <rect x="567" y="212" width="46" height="22" rx="11" fill="none" stroke="#555" stroke-width="1.5"/>
  <text x="590" y="227" font-size="14" font-weight="bold" fill="#888" text-anchor="middle">.dev</text>

  <!-- Region nodes - HOLLOW dashed circles with dashed connection lines -->
  <!-- Left column -->
  <line x1="484" y1="148" x2="562" y2="152" stroke="#454d5d" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <circle cx="472" cy="148" r="11" fill="none" stroke="#ff6b9d" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="472" y="152" font-size="8" fill="#888" text-anchor="middle">EU</text>

  <line x1="484" y1="186" x2="562" y2="167" stroke="#454d5d" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <circle cx="472" cy="186" r="11" fill="none" stroke="#ff6b9d" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="472" y="190" font-size="8" fill="#888" text-anchor="middle">US</text>

  <line x1="484" y1="224" x2="562" y2="182" stroke="#454d5d" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <circle cx="472" cy="224" r="11" fill="none" stroke="#ff6b9d" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="472" y="228" font-size="8" fill="#888" text-anchor="middle">CA</text>

  <!-- Right column -->
  <line x1="696" y1="148" x2="618" y2="152" stroke="#454d5d" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <circle cx="708" cy="148" r="11" fill="none" stroke="#ff6b9d" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="708" y="152" font-size="8" fill="#888" text-anchor="middle">NZ</text>

  <line x1="696" y1="186" x2="618" y2="167" stroke="#454d5d" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <circle cx="708" cy="186" r="11" fill="none" stroke="#ff6b9d" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="708" y="190" font-size="8" fill="#888" text-anchor="middle">UK</text>

  <!-- Wrench icon (development tool) -->
  <g transform="translate(590, 258)" opacity="0.5">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#555" stroke-width="1.5"/>
    <line x1="6" y1="6" x2="14" y2="14" stroke="#555" stroke-width="2" stroke-linecap="round"/>
    <line x1="11" y1="14" x2="14" y2="11" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Benefits text -->
  <text x="590" y="290" font-size="8" fill="#888" text-anchor="middle">staging · testing · CI/CD</text>

  <!-- Technical benefits -->
  <text x="590" y="330" font-size="8" fill="#555" text-anchor="middle">HSTS preload · cookie jars · origin isolation</text>


  <!-- ==================== BOTTOM BANNER ==================== -->
  <rect x="210" y="358" width="380" height="22" rx="11" fill="#c04757" opacity="0.85"/>
  <text x="400" y="373" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">SAME ARCHITECTURE · DIFFERENT TLD · CLEAN SEPARATION</text>

  <!-- Byline -->
  <text x="790" y="396" font-size="10" font-style="italic" text-anchor="end" fill="#666">
    Crafted by Claude Opus 4.6 with minimal supervision
  </text>
</svg>
