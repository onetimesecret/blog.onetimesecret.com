<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="prodGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c04757; stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0a192f; stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="devGlow" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d; stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#0a192f; stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0a192f"/>

  <!-- Title -->
  <text x="400" y="40" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">1-800-Dot-Dev</text>
  <text x="400" y="58" font-size="11" fill="#888" text-anchor="middle">A domain strategy for clear environment separation</text>
  <line x1="80" y1="70" x2="720" y2="70" stroke="#c04757" stroke-width="2"/>

  <!-- ==================== LEFT: PRODUCTION (.com) ==================== -->
  <!-- Subtle glow -->
  <rect x="42" y="86" width="335" height="258" rx="8" fill="url(#prodGlow)"/>
  <!-- Panel border -->
  <rect x="42" y="86" width="335" height="258" rx="8" fill="none" stroke="#c04757" stroke-width="1.5"/>

  <!-- Label -->
  <text x="210" y="110" font-size="13" font-weight="bold" fill="#c04757" text-anchor="middle" letter-spacing="2">PRODUCTION</text>

  <!-- Central server rack - SOLID filled -->
  <rect x="182" y="125" width="56" height="78" rx="4" fill="#c04757"/>
  <rect x="190" y="133" width="40" height="9" rx="2" fill="#0a192f"/>
  <circle cx="222" cy="137" r="2.5" fill="#4ade80"/>
  <rect x="190" y="148" width="40" height="9" rx="2" fill="#0a192f"/>
  <circle cx="222" cy="152" r="2.5" fill="#4ade80"/>
  <rect x="190" y="163" width="40" height="9" rx="2" fill="#0a192f"/>
  <circle cx="222" cy="167" r="2.5" fill="#4ade80"/>
  <rect x="190" y="178" width="40" height="9" rx="2" fill="#0a192f"/>
  <circle cx="222" cy="182" r="2.5" fill="#4ade80"/>

  <!-- TLD badge - solid -->
  <rect x="187" y="212" width="46" height="22" rx="11" fill="#c04757"/>
  <text x="210" y="227" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">.com</text>

  <!-- Region nodes - SOLID filled circles with connection lines -->
  <!-- Left column -->
  <line x1="104" y1="148" x2="182" y2="152" stroke="#ff6b9d" stroke-width="1" opacity="0.35"/>
  <circle cx="92" cy="148" r="11" fill="#ff6b9d"/>
  <text x="92" y="152" font-size="8" font-weight="bold" fill="#0a192f" text-anchor="middle">EU</text>

  <line x1="104" y1="186" x2="182" y2="167" stroke="#ff6b9d" stroke-width="1" opacity="0.35"/>
  <circle cx="92" cy="186" r="11" fill="#ff6b9d"/>
  <text x="92" y="190" font-size="8" font-weight="bold" fill="#0a192f" text-anchor="middle">US</text>

  <line x1="104" y1="224" x2="182" y2="182" stroke="#ff6b9d" stroke-width="1" opacity="0.35"/>
  <circle cx="92" cy="224" r="11" fill="#ff6b9d"/>
  <text x="92" y="228" font-size="8" font-weight="bold" fill="#0a192f" text-anchor="middle">CA</text>

  <!-- Right column -->
  <line x1="316" y1="148" x2="238" y2="152" stroke="#ff6b9d" stroke-width="1" opacity="0.35"/>
  <circle cx="328" cy="148" r="11" fill="#ff6b9d"/>
  <text x="328" y="152" font-size="8" font-weight="bold" fill="#0a192f" text-anchor="middle">NZ</text>

  <line x1="316" y1="186" x2="238" y2="167" stroke="#ff6b9d" stroke-width="1" opacity="0.35"/>
  <circle cx="328" cy="186" r="11" fill="#ff6b9d"/>
