  <rect x="374" y="266" width="52" height="20" rx="10" fill="#c04757" opacity="0.85"/>
  <text x="400" y="280" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">TLD ≠ TLD</text>

  <!-- Vertical hash marks on divider (fence metaphor) -->
  <g stroke="#c04757" stroke-width="1" opacity="0.25">
    <line x1="394" y1="295" x2="406" y2="295"/>
    <line x1="394" y1="305" x2="406" y2="305"/>
    <line x1="394" y1="315" x2="406" y2="315"/>
    <line x1="394" y1="325" x2="406" y2="325"/>
    <line x1="394" y1="335" x2="406" y2="335"/>
  </g>


