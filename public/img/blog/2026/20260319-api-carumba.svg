<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep void gradient - the blank page -->
    <radialGradient id="void" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="60%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>

    <!-- Bowl gradient - humble earthenware -->
    <linearGradient id="bowlGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="50%" style="stop-color:#b8860b"/>
      <stop offset="100%" style="stop-color:#8b6914"/>
    </linearGradient>

    <!-- Broth gradient -->
    <linearGradient id="brothGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a227"/>
      <stop offset="100%" style="stop-color:#9a7b0a"/>
    </linearGradient>

    <!-- Steam/slash glow -->
    <filter id="steamGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Surreal warp filter -->
    <filter id="warp">
      <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Stars pattern -->
    <pattern id="stars" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="8" r="0.5" fill="#ffffff" opacity="0.6"/>
      <circle cx="25" cy="3" r="0.3" fill="#ffffff" opacity="0.4"/>
      <circle cx="45" cy="15" r="0.4" fill="#ffffff" opacity="0.5"/>
      <circle cx="12" cy="30" r="0.6" fill="#ffffff" opacity="0.7"/>
      <circle cx="35" cy="40" r="0.3" fill="#ffffff" opacity="0.3"/>
      <circle cx="48" cy="45" r="0.5" fill="#ffffff" opacity="0.5"/>
      <circle cx="20" cy="48" r="0.4" fill="#ffffff" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- The void (blank page) -->
  <rect width="100%" height="100%" fill="url(#void)"/>
  <rect width="100%" height="100%" fill="url(#stars)" opacity="0.8"/>

  <!-- Floating text fragments - lost content -->
  <g opacity="0.15" font-family="monospace" font-size="8" fill="#4a9eff">
    <text x="30" y="50" transform="rotate(-15 30 50)">undefined</text>
    <text x="320" y="80" transform="rotate(10 320 80)">null</text>
    <text x="60" y="350" transform="rotate(5 60 350)">{}</text>
    <text x="300" y="320" transform="rotate(-8 300 320)">payload</text>
    <text x="40" y="150" transform="rotate(-20 40 150)">content</text>
    <text x="340" y="200" transform="rotate(15 340 200)">missing</text>
  </g>

  <!-- Bowl shadow - floating effect -->
  <ellipse cx="200" cy="320" rx="90" ry="20" fill="#000" opacity="0.3" filter="url(#steamGlow)"/>

  <!-- The humble bowl - outer -->
  <path d="M110 230 Q100 280 130 300 L270 300 Q300 280 290 230 Z"
        fill="url(#bowlGrad)" stroke="#6b4423" stroke-width="2"/>

  <!-- Bowl rim -->
  <ellipse cx="200" cy="230" rx="90" ry="25" fill="#e8c87a" stroke="#6b4423" stroke-width="2"/>

  <!-- The humble broth -->
  <ellipse cx="200" cy="235" rx="80" ry="20" fill="url(#brothGrad)"/>

  <!-- Broth surface details - noodle-like paths -->
  <g stroke="#daa520" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M150 235 Q170 230 190 237 Q210 242 230 235"/>
    <path d="M160 240 Q180 235 200 240"/>
    <path d="M220 232 Q240 238 250 232"/>
  </g>

  <!-- Steam rising - transforming into TRAILING SLASHES -->
  <g filter="url(#steamGlow)" opacity="0.8">
    <!-- First slash pair -->
    <text x="155" y="200" font-family="monospace" font-size="28" fill="#fff" opacity="0.9">/</text>
    <text x="175" y="170" font-family="monospace" font-size="24" fill="#fff" opacity="0.7">/</text>

    <!-- Second slash pair rising -->
    <text x="200" y="185" font-family="monospace" font-size="30" fill="#fff" opacity="0.85">/</text>
    <text x="220" y="150" font-family="monospace" font-size="22" fill="#fff" opacity="0.5">/</text>

    <!-- Third slash pair - highest -->
    <text x="240" y="175" font-family="monospace" font-size="26" fill="#fff" opacity="0.75">/</text>
    <text x="255" y="140" font-family="monospace" font-size="18" fill="#fff" opacity="0.4">/</text>

    <!-- Wispy steam lines connecting slashes -->
    <path d="M170 210 Q175 190 180 165" stroke="#fff" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M215 215 Q220 185 225 155" stroke="#fff" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M252 205 Q258 180 262 145" stroke="#fff" stroke-width="1" fill="none" opacity="0.3"/>
  </g>

  <!-- Dalí-inspired optical illusion: bowl base forms a face in profile -->
  <g opacity="0.6">
    <!-- The "face" is suggested in the bowl's shadow and base -->
    <!-- Eye suggested by a gleam -->
    <circle cx="150" cy="275" r="3" fill="#ffd700" opacity="0.4"/>
    <!-- Nose ridge in the bowl curve -->
    <!-- Chin at bowl base -->
  </g>

  <!-- Floating path fragments - the mismatch -->
  <g font-family="monospace" font-size="10">
    <text x="50" y="100" fill="#ff6b6b" opacity="0.7">/posts/my-great-post</text>
    <text x="240" y="370" fill="#6bff6b" opacity="0.7">/posts/my-great-post/</text>
    <!-- The crucial difference -->
    <text x="383" y="370" fill="#ffd700" font-weight="bold" font-size="14" opacity="0.9">/</text>
  </g>

  <!-- Surreal melting clock reference - time debugging -->
  <g transform="translate(320, 60) rotate(25)">
    <ellipse cx="0" cy="0" rx="25" ry="20" fill="none" stroke="#888" stroke-width="1" opacity="0.4" filter="url(#warp)"/>
    <text x="-8" y="5" font-family="serif" font-size="10" fill="#888" opacity="0.5">3:14</text>
  </g>

  <!-- Constellation connecting the path fragments -->
  <g stroke="#4a9eff" stroke-width="0.5" opacity="0.3">
    <line x1="50" y1="100" x2="155" y2="200"/>
    <line x1="155" y1="200" x2="200" y2="235"/>
    <line x1="200" y1="235" x2="240" y2="370"/>
  </g>

  <!-- Small constellation dots -->
  <g fill="#4a9eff" opacity="0.6">
    <circle cx="50" cy="100" r="2"/>
    <circle cx="155" cy="200" r="2"/>
    <circle cx="200" cy="235" r="2"/>
    <circle cx="240" cy="370" r="2"/>
  </g>

  <!-- Floating spoon - stirring up trouble -->
  <g transform="translate(270, 250) rotate(-35)">
    <ellipse cx="0" cy="0" rx="15" ry="10" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
    <rect x="-3" y="10" width="6" height="50" rx="2" fill="linear-gradient(#d4d4d4, #a0a0a0)" stroke="#808080"/>
  </g>

  <!-- Title text -->
  <text x="200" y="390" text-anchor="middle" font-family="serif" font-size="11" fill="#666" font-style="italic">
    mea gulpa
  </text>

  <!-- Crafted by line -->
  <text x="200" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#444">
    Inspired by Dalí's optical illusions
  </text>
</svg>
