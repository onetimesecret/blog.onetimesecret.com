
<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="100%" height="100%" fill="#0a192f"/>

  <!-- Title text -->
  <text x="50" y="80" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">
    UK Region Now Available
  </text>

  <!-- Decorative line -->
  <line x1="50" y1="100" x2="750" y2="100" stroke="#c04757" stroke-width="3"/>

  <!-- Simplified crown icon for UK -->
  <g transform="translate(370, 110)">
    <!-- Crown base -->
    <rect x="0" y="35" width="60" height="10" fill="#c04757" rx="2"/>
    <!-- Crown points -->
    <polygon points="0,35 5,15 15,30 30,5 45,30 55,15 60,35" fill="#c04757"/>
    <!-- Crown jewels -->
    <circle cx="5" cy="20" r="3" fill="#ffd700"/>
    <circle cx="30" cy="10" r="4" fill="#ffd700"/>
    <circle cx="55" cy="20" r="3" fill="#ffd700"/>
  </g>

  <!-- Domain listings -->
  <text x="400" y="185" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ff6b9d" text-anchor="middle">
    eu.onetimesecret.com
  </text>
  <text x="400" y="220" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ff6b9d" text-anchor="middle">
    us.onetimesecret.com
  </text>
  <text x="400" y="255" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ff6b9d" text-anchor="middle">
    ca.onetimesecret.com
  </text>
  <text x="400" y="290" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ff6b9d" text-anchor="middle">
    nz.onetimesecret.com
  </text>
  <text x="400" y="325" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ff6b9d" text-anchor="middle">
    uk.onetimesecret.com
  </text>

  <!-- Highlight for UK domain -->
  <rect x="260" y="305" width="280" height="30" fill="none" stroke="#c04757" stroke-width="2" rx="5"/>

  <!-- Decorative elements representing data centers -->
  <circle cx="110" cy="185" r="12" fill="#ff6b9d" opacity="0.7"/>
  <circle cx="110" cy="220" r="12" fill="#ff6b9d" opacity="0.7"/>
  <circle cx="110" cy="255" r="12" fill="#ff6b9d" opacity="0.7"/>
  <circle cx="110" cy="290" r="12" fill="#ff6b9d" opacity="0.7"/>
  <circle cx="110" cy="325" r="12" fill="#ff6b9d" opacity="0.7"/>

  <!-- Lines connecting data centers to domain names -->
  <line x1="122" y1="185" x2="240" y2="185" stroke="#454d5d" stroke-width="2"/>
  <line x1="122" y1="220" x2="240" y2="220" stroke="#454d5d" stroke-width="2"/>
  <line x1="122" y1="255" x2="240" y2="255" stroke="#454d5d" stroke-width="2"/>
  <line x1="122" y1="290" x2="240" y2="290" stroke="#454d5d" stroke-width="2"/>
  <line x1="122" y1="325" x2="240" y2="325" stroke="#454d5d" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Share-nothing architecture representation -->
  <rect x="640" y="170" width="25" height="25" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="680" y="170" width="25" height="25" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="640" y="205" width="25" height="25" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="680" y="205" width="25" height="25" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="640" y="240" width="25" height="25" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="680" y="240" width="25" height="25" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="640" y="275" width="25" height="25" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="680" y="275" width="25" height="25" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="640" y="310" width="25" height="25" fill="none" stroke="#c04757" stroke-width="3"/>
  <rect x="680" y="310" width="25" height="25" fill="none" stroke="#c04757" stroke-width="3"/>

  <!-- Small labels for share-nothing boxes -->
  <text x="672" y="365" font-family="Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">
    share-nothing
  </text>

  <!-- Byline at bottom right -->
  <text x="790" y="395" font-family="Arial, sans-serif" font-size="12" font-style="italic" text-anchor="end" fill="#888">
    Crafted by Claude Opus 4.6 with minimal supervision
  </text>
</svg>
