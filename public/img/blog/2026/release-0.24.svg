<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>
    .hidden-message {
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }

    svg:hover .hidden-message {
      opacity: 1;
    }

    .main-content {
      transition: opacity 0.3s ease-in-out;
    }

    svg:hover .main-content {
      opacity: 0.3;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
      100% { transform: translateY(0px); }
    }

    .floating {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    .pulsing {
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }

    .glowing {
      animation: glow 2.5s ease-in-out infinite;
    }

    @keyframes unfold {
      0% { transform: scaleY(0.8); opacity: 0.7; }
      50% { transform: scaleY(1.05); opacity: 1; }
      100% { transform: scaleY(0.8); opacity: 0.7; }
    }

    .unfolding {
      transform-origin: center bottom;
      animation: unfold 4s ease-in-out infinite;
    }

    @keyframes orbit {
      from { transform: rotate(0deg) translateX(18px) rotate(0deg); }
      to { transform: rotate(360deg) translateX(18px) rotate(-360deg); }
    }

    .orbiting {
      animation: orbit 8s linear infinite;
    }

    @keyframes ripple {
      0% { r: 0; opacity: 0.8; }
      100% { r: 20; opacity: 0; }
    }

    .ripple {
      animation: ripple 3s ease-out infinite;
    }

    @font-face {
      font-family: 'Zilla Slab';
      src: url('https://onetimesecret.com/dist/assets/ZillaSlab-Regular-CpTS5Ubm.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    text.release {
      font-family: 'Zilla Slab', sans-serif !important;
    }
  </style>

  <defs>
    <radialGradient id="epochGradient" cx="50%" cy="40%" r="60%" fx="45%" fy="35%">
      <stop offset="0%" style="stop-color:#b45309; stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#78350f; stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#451a03; stop-opacity:1"/>
    </radialGradient>

    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24; stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#f59e0b; stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d97706; stop-opacity:1"/>
    </linearGradient>

    <!-- PostgreSQL elephant silhouette (simplified) -->
    <g id="elephant">
      <ellipse cx="0" cy="0" rx="8" ry="7" fill="#38bdf8"/>
      <ellipse cx="-5" cy="6" rx="3" ry="5" fill="#38bdf8"/>
      <ellipse cx="5" cy="6" rx="3" ry="5" fill="#38bdf8"/>
      <path d="M 6,-3 Q 10,-6 8,-1" fill="#38bdf8" stroke="#38bdf8" stroke-width="0.5"/>
      <circle cx="-3" cy="-2" r="1.2" fill="#0c4a6e"/>
    </g>

    <!-- RabbitMQ rabbit ear -->
    <g id="rabbit">
      <ellipse cx="0" cy="2" rx="7" ry="6" fill="#f97316"/>
      <ellipse cx="-3" cy="-7" rx="2.5" ry="6" fill="#f97316" transform="rotate(-10, -3, -7)"/>
      <ellipse cx="3" cy="-7" rx="2.5" ry="6" fill="#f97316" transform="rotate(10, 3, -7)"/>
      <ellipse cx="-3" cy="-7" rx="1.5" ry="4" fill="#fed7aa" transform="rotate(-10, -3, -7)"/>
      <ellipse cx="3" cy="-7" rx="1.5" ry="4" fill="#fed7aa" transform="rotate(10, 3, -7)"/>
      <circle cx="-2" cy="0" r="1" fill="#7c2d12"/>
      <circle cx="2" cy="0" r="1" fill="#7c2d12"/>
    </g>

    <!-- Lock with three modes -->
    <g id="trilock">
      <rect x="-9" y="-2" width="18" height="13" fill="url(#goldShine)" rx="2"/>
      <path d="M -5,-2 L -5,-6 A 5,5 0 0 1 5,-6 L 5,-2" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="-4" cy="5" r="1.5" fill="#451a03"/>
      <circle cx="0" cy="5" r="1.5" fill="#451a03"/>
      <circle cx="4" cy="5" r="1.5" fill="#451a03"/>
    </g>

    <!-- Migration arrow path -->
    <g id="migrationArrow">
      <path d="M -10,0 L 6,0" fill="none" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M 3,-4 L 10,0 L 3,4" fill="none" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#epochGradient)"/>

  <!-- Subtle radial light burst behind version number -->
  <circle cx="100" cy="108" r="50" fill="#fbbf24" opacity="0.06"/>
  <circle cx="100" cy="108" r="35" fill="#fbbf24" opacity="0.04"/>

  <!-- Main content -->
  <g class="main-content">
    <!-- Version number -->
    <text class="release" x="100" y="112" font-size="80" font-weight="bold"
          text-anchor="middle" dominant-baseline="middle" fill="#fcf8f2">24</text>

    <!-- 5K+ commits badge -->
    <g transform="translate(100, 58)" class="glowing">
      <rect x="-18" y="-8" width="36" height="16" fill="#fbbf24" opacity="0.9" rx="8"/>
      <text x="0" y="3" font-size="8" fill="#451a03" text-anchor="middle" font-weight="bold">5K+</text>
    </g>

    <!-- Thematic symbols -->
    <g class="floating">
      <!-- PostgreSQL (top-left) -->
      <g transform="translate(48, 72)" class="glowing">
        <use href="#elephant" opacity="0.9"/>
      </g>

      <!-- RabbitMQ (top-right) -->
      <g transform="translate(152, 72)" class="pulsing">
        <use href="#rabbit" opacity="0.9"/>
      </g>

      <!-- Auth lock with three modes (bottom-center) -->
      <g transform="translate(100, 155)" class="glowing">
        <use href="#trilock"/>
      </g>

      <!-- Migration arrow (bottom-left) -->
      <g transform="translate(52, 148)">
        <use href="#migrationArrow" class="pulsing"/>
      </g>

      <!-- Config file (bottom-right) -->
      <g transform="translate(148, 148)" class="pulsing">
        <rect x="-7" y="-9" width="14" height="18" fill="#c084fc" opacity="0.85" rx="1"/>
        <line x1="-4" y1="-4" x2="4" y2="-4" stroke="#581c87" stroke-width="1.2" opacity="0.7"/>
        <line x1="-4" y1="-1" x2="4" y2="-1" stroke="#581c87" stroke-width="1.2" opacity="0.7"/>
        <line x1="-4" y1="2" x2="2" y2="2" stroke="#581c87" stroke-width="1.2" opacity="0.7"/>
        <line x1="-4" y1="5" x2="3" y2="5" stroke="#581c87" stroke-width="1.2" opacity="0.7"/>
      </g>
    </g>

    <!-- Decorative accent dots -->
    <g class="pulsing">
      <circle cx="25" cy="170" r="2" fill="#38bdf8" opacity="0.5"/>
      <circle cx="35" cy="178" r="1.5" fill="#f97316" opacity="0.5"/>
      <circle cx="165" cy="170" r="2" fill="#fbbf24" opacity="0.5"/>
      <circle cx="175" cy="178" r="1.5" fill="#a3e635" opacity="0.5"/>
      <circle cx="25" cy="55" r="1.5" fill="#c084fc" opacity="0.4"/>
      <circle cx="175" cy="55" r="1.5" fill="#fbbf24" opacity="0.4"/>
    </g>
  </g>

  <!-- Hidden message -->
  <g class="hidden-message">
    <rect x="15" y="65" width="170" height="72" fill="rgba(0,0,0,0.85)" rx="10" ry="10"/>
    <text x="100" y="83" font-size="11" text-anchor="middle" fill="#fbbf24" font-weight="bold">
      The Architecture Release
    </text>
    <text x="100" y="98" font-size="10" text-anchor="middle" fill="#fcf8f2">
      PostgreSQL 17+ &amp; RabbitMQ 4.3
    </text>
    <text x="100" y="112" font-size="10" text-anchor="middle" fill="#fcf8f2">
      Three Authentication Modes
    </text>
    <text x="100" y="128" font-size="9" text-anchor="middle" fill="#a1a1aa">
      5,000+ commits &bull; Data Migration
    </text>
  </g>

  <!-- Title -->
  <text x="100" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#fcf8f2" font-family="'Zilla Slab', Arial, sans-serif">
    Onetime Secret v0.24.0
  </text>

  <!-- Signature -->
  <text x="190" y="195" font-family="'Zilla Slab', Arial, sans-serif" font-size="8" font-style="italic" text-anchor="end" fill="#fcf8f2">Celebration by Claude Opus 4.6</text>
</svg>
